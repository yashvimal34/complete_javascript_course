<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConvertX - Unit Transformer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>ConvertX</h1>
        <div class="input-group">
            <input type="number" id="input-to-covert" placeholder="Enter value" />
            <button id="convert-btn">Convert</button>
        </div>

        <div class="conversion-section">
            <h2>Length (Meter / Feet)</h2>
            <p id="meter-feet" class="result"></p>
        </div>

        <div class="conversion-section">
            <h2>Volume (Liters / Gallons)</h2>
            <p id="liter-gallon" class="result"></p>
        </div>

        <div class="conversion-section">
            <h2>Mass (Kilograms / Pounds)</h2>
            <p id="kilos-pounds" class="result"></p>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
