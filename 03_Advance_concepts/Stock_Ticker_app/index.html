<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Ticker</title>
    <style>
        :root {
            color-scheme: dark;
            color: #f5f5f5;
            background: #0f172a;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background: radial-gradient(circle at top left, #2a4365 0%, transparent 35%),
                        radial-gradient(circle at bottom right, #0f172a 0%, #020617 40%),
                        linear-gradient(180deg, #071018 0%, #0f172a 100%);
        }

        .ticker-card {
            width: min(480px, 100%);
            padding: 32px;
            border-radius: 24px;
            background: rgba(15, 23, 42, 0.88);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(148, 163, 184, 0.14);
            text-align: center;
        }

        #stock-name {
            margin: 0 0 8px;
            font-size: clamp(2rem, 4vw, 3rem);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #82c7ff;
        }

        #symbol {
            margin: 0 0 24px;
            font-size: clamp(1.25rem, 2.5vw, 1.75rem);
            color: #cbd5e1;
            letter-spacing: 0.12em;
        }

        #price {
            margin: 0;
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 700;
            color: #f8fafc;
        }

        #time {
            margin: 18px 0 0;
            font-size: 1rem;
            color: #94a3b8;
        }

        .hint {
            margin-top: 18px;
            font-size: 0.95rem;
            color: #cbd5e1;
            opacity: 0.86;
        }
    </style>
</head>
<body>
    <div class="ticker-card">
        <h1 id="stock-name"></h1>
        <h1 id="symbol"></h1>
        <h1 id="price"></h1>
        <h1 id="time"></h1>
        <p class="hint">Live stock ticker demo — price arrow updates automatically.</p>
    </div>

    <script src="index.js"></script>
</body>
</html>
